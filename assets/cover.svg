<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0E1320"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1B2230" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D9A56D" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D9A56D" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D9A56D" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent -->
  <line x1="120" y1="80" x2="380" y2="80" stroke="url(#goldFade)" stroke-width="1"/>

  <!-- Tag -->
  <text x="120" y="105" fill="#D9A56D" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="3">SOLO FOUNDER OS · v1.0</text>

  <!-- Main title -->
  <text x="120" y="200" fill="#F5F5F0" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5">
    Claude Code Pack
  </text>
  <text x="120" y="270" fill="#F5F5F0" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5">
    that <tspan fill="#D9A56D">actually ships</tspan>
  </text>

  <!-- Subtitle -->
  <text x="120" y="325" fill="#A8B0BD" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="20" font-weight="400">
    11 agents · 10 skills · 10 commands · 4 hooks · CLAUDE.md template
  </text>
  <text x="120" y="355" fill="#A8B0BD" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="20" font-weight="400">
    6 months of solo SaaS work · sanitized · drop into <tspan font-family="ui-monospace, monospace" fill="#D9A56D">~/.claude/</tspan>
  </text>

  <!-- Terminal mockup right side -->
  <g transform="translate(720, 130)">
    <rect x="0" y="0" width="380" height="320" rx="10" fill="#1B2230" stroke="#2A3242" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="380" height="32" rx="10" fill="#16202E"/>
    <rect x="0" y="22" width="380" height="10" fill="#16202E"/>
    <circle cx="20" cy="16" r="5" fill="#FF5F56"/>
    <circle cx="40" cy="16" r="5" fill="#FFBD2E"/>
    <circle cx="60" cy="16" r="5" fill="#27C93F"/>
    <text x="190" y="20" fill="#888" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">~/.claude/</text>

    <!-- File tree -->
    <g font-family="ui-monospace, 'SF Mono', monospace" font-size="13">
      <text x="20" y="60" fill="#A8B0BD">📁 agents/<tspan fill="#66707D" font-size="11">  (11)</tspan></text>
      <text x="40" y="80" fill="#888">├ architect.md</text>
      <text x="40" y="98" fill="#888">├ planner.md</text>
      <text x="40" y="116" fill="#888">├ code-reviewer.md</text>
      <text x="40" y="134" fill="#66707D">└ ...8 more</text>

      <text x="20" y="160" fill="#A8B0BD">📁 skills/<tspan fill="#66707D" font-size="11">  (10)</tspan></text>
      <text x="40" y="180" fill="#888">├ idea-eval/</text>
      <text x="40" y="198" fill="#888">├ ship-checklist/</text>
      <text x="40" y="216" fill="#66707D">└ ...8 more</text>

      <text x="20" y="240" fill="#A8B0BD">📁 commands/<tspan fill="#66707D" font-size="11">  (10)</tspan></text>
      <text x="40" y="260" fill="#888">├ /save-session</text>
      <text x="40" y="278" fill="#66707D">└ ...9 more</text>

      <text x="20" y="304" fill="#D9A56D">📄 CLAUDE.md</text>
    </g>
  </g>

  <!-- Bottom row · feature pills -->
  <g transform="translate(120, 440)">
    <g>
      <rect x="0" y="0" width="180" height="44" rx="6" fill="#1B2230" stroke="#2A3242"/>
      <text x="90" y="29" fill="#D9A56D" font-family="-apple-system, sans-serif" font-size="14" text-anchor="middle">Battle-tested</text>
    </g>
    <g transform="translate(195, 0)">
      <rect x="0" y="0" width="180" height="44" rx="6" fill="#1B2230" stroke="#2A3242"/>
      <text x="90" y="29" fill="#D9A56D" font-family="-apple-system, sans-serif" font-size="14" text-anchor="middle">60-sec install</text>
    </g>
    <g transform="translate(390, 0)">
      <rect x="0" y="0" width="180" height="44" rx="6" fill="#1B2230" stroke="#2A3242"/>
      <text x="90" y="29" fill="#D9A56D" font-family="-apple-system, sans-serif" font-size="14" text-anchor="middle">Sanitized</text>
    </g>
    <g transform="translate(585, 0)">
      <rect x="0" y="0" width="180" height="44" rx="6" fill="#1B2230" stroke="#2A3242"/>
      <text x="90" y="29" fill="#D9A56D" font-family="-apple-system, sans-serif" font-size="14" text-anchor="middle">$39 / $79 / $199</text>
    </g>
  </g>

  <!-- Bottom hint -->
  <text x="120" y="570" fill="#66707D" font-family="-apple-system, sans-serif" font-size="13">
    Built by a solo founder who actually uses this every day to ship real products
  </text>

  <!-- Bottom accent -->
  <line x1="120" y1="595" x2="380" y2="595" stroke="url(#goldFade)" stroke-width="1"/>
</svg>
